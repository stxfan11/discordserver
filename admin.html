<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #0f111a;
    color: #e5e7eb;
}

header {
    background: #111827;
    padding: 20px 40px;
}

main {
    padding: 30px;
}

table {
    width: 100%;
    border-collapse: collapse;
}

td, th {
    padding: 10px;
}

th {
    background: #111827;
}

button {
    cursor: pointer;
}
</style>
</head>

<body>

<header>
    <h1>🛠️ Admin Dashboard</h1>
</header>

<main>
    <h2>Total Orders: <span id="total-orders">0</span></h2>
    <h2>Total Revenue: €<span id="total-revenue">0.00</span></h2>

    <table>
        <thead>
            <tr>
                <th>Name</th>
                <th>Discord</th>
                <th>Product</th>
                <th>Price</th>
                <th>Status</th>
                <th>Delete</th>
            </tr>
        </thead>
        <tbody id="orders-table"></tbody>
    </table>
</main>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { 
    getFirestore, collection, getDocs, updateDoc, deleteDoc, doc 
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// 🔥 PLAK HIER JOUW CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyB3tDV5M21Pzv1pOsBKaCHlf9886YcUMYU",
  authDomain: "webshop-82a87.firebaseapp.com",
  projectId: "webshop-82a87",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let orders = [];

async function loadOrders() {
    const snapshot = await getDocs(collection(db, "orders"));
    
    orders = [];
    snapshot.forEach(docSnap => {
        orders.push({
            id: docSnap.id,
            ...docSnap.data()
        });
    });

    renderOrders();
}

function renderOrders() {
    const table = document.getElementById("orders-table");
    const totalOrders = document.getElementById("total-orders");
    const totalRevenue = document.getElementById("total-revenue");

    table.innerHTML = "";
    let revenue = 0;

    orders.forEach(order => {
        revenue += Number(order.price || 0);

        table.innerHTML += `
        <tr>
            <td>${order.name}</td>
            <td>${order.discord}</td>
            <td>${order.product}</td>
            <td>€${Number(order.price).toFixed(2)}</td>
            <td>
                <select onchange="updateStatus('${order.id}', this.value)">
                    <option ${order.status === 'Pending' ? 'selected' : ''}>Pending</option>
                    <option ${order.status === 'Completed' ? 'selected' : ''}>Completed</option>
                </select>
            </td>
            <td>
                <button onclick="deleteOrder('${order.id}')">❌</button>
            </td>
        </tr>
        `;
    });

    totalOrders.textContent = orders.length;
    totalRevenue.textContent = revenue.toFixed(2);
}

window.updateStatus = async (id, status) => {
    await updateDoc(doc(db, "orders", id), { status });
    loadOrders();
};

window.deleteOrder = async (id) => {
    await deleteDoc(doc(db, "orders", id));
    loadOrders();
};

// Auto refresh elke 5 sec
setInterval(loadOrders, 5000);

// Eerste load
loadOrders();
</script>

</body>
</html>
